    // =======================================================================

    const openState = {}; // country -> bool
    let totalPorts = 0, coastal = 0, landlocked = 0;
    DATA.forEach(function (c) {
      totalPorts += c.ports.length;
      if (c.landlocked) landlocked++; else coastal++;
    });
    document.getElementById("sPorts").textContent = totalPorts;
    document.getElementById("sCountries").textContent = DATA.length;
    document.getElementById("sCoastal").textContent = coastal;
    document.getElementById("sLand").textContent = landlocked;

    function setAll(open) {
      DATA.forEach(function (c) { openState[c.country] = open; });
      render();
    }
    function toggle(name) {
      openState[name] = !openState[name];
      render();
    }
    window.toggle = toggle;
    window.setAll = setAll;

    function render() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const hideLand = document.getElementById("hideLand").checked;
      const list = document.getElementById("list");
      let html = "";
      let shownCountries = 0, shownPorts = 0;

      DATA.forEach(function (c) {
        if (hideLand && c.landlocked) return;
        const countryMatch = !q || c.country.toLowerCase().includes(q);
        const matched = c.ports.filter(function (p) {
          return !q || p[0].toLowerCase().includes(q) || p[1].toLowerCase().includes(q);
        });
        if (q && !countryMatch && matched.length === 0) return;

        shownCountries++;
        const isOpen = q ? true : !!openState[c.country];
        const portsToShow = (q && !countryMatch) ? matched : c.ports;
        shownPorts += portsToShow.length;

        html += '<div class="country">';
        html += '<div class="chead" ' + (q ? '' : 'onclick="toggle(\'' + c.country.replace(/'/g, "\\'") + '\')"') + '>';
        if (!q) html += '<span class="arrow">' + (isOpen ? "▼" : "▶") + '</span>';
        html += '<span class="cname">' + c.country + '</span>';
        if (c.landlocked) {
          html += '<span class="badge badge-amber">Landlocked</span>';
        } else {
          html += '<span class="badge badge-blue">' + c.ports.length + ' port' + (c.ports.length !== 1 ? "s" : "") + '</span>';
        }
        html += '</div>';

        if (isOpen) {
          if (c.landlocked) {
            html += '<div class="landlocked-note">N/A — Landlocked country (no sea ports)</div>';
          } else {
            html += '<table><thead><tr><th style="width:40px;">#</th><th>Port Name</th><th>Port Code (UN/LOCODE)</th></tr></thead><tbody>';
            portsToShow.forEach(function (p, i) {
              html += '<tr><td class="num">' + (i + 1) + '</td><td><strong>' + p[0] + '</strong></td><td><span class="code">' + p[1] + '</span></td></tr>';
            });
            html += '</tbody></table>';
          }
        }
        html += '</div>';
      });

      if (shownCountries === 0) {
        list.innerHTML = '<div class="empty">Koi result nahi mila.</div>';
      } else {
        list.innerHTML = html;
      }
      document.getElementById("info").innerHTML =
        "Showing <b>" + shownPorts + "</b> ports across <b>" + shownCountries + "</b> countries.";
    }

    render();
  </script>
